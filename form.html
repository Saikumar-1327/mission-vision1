<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./form.css">
</head>
<body>
    <h2 class="main-title">
        Bit Repository contact form
    </h2>

<div class="form-container">

    
    <div class="form-box">
        <h2>Contact Us</h2>

        <form>
            <label>Name <span>&#42;</span></label>
            <input type="text">

        <label>E-Mail <span>&#42;</span></label>
            <input type="email">

         <label>Subject</label>
            <input type="text">

         <label>Comments <span>&#42;</span></label>
            <textarea></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>


    
    <div class="form-box">
        <h2>What do you think about this website?</h2>

        <form>
            <label>Name <span>&#42;</span></label>
            <input type="text">

            <label>Opinion <span>&#42;</span></label>
            <textarea></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

</div>
</body>
</html>
